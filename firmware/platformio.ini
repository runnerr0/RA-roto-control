; RA Roto Control — firmware build config
; Primary target: Olimex ESP32-POE-ISO (native LAN8720 Ethernet + PoE).
; Pinned to espressif32 6.x (Arduino-ESP32 2.0.x) for the classic ETH.begin() signature
; used in NetworkManager. If you bump the platform to 3.x, update NetworkManager accordingly.

[platformio]
default_envs = olimex_poe_iso
src_dir = src

[env]
framework = arduino
monitor_speed = 115200
build_flags =
  -D CORE_DEBUG_LEVEL=3
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  esp32async/ESPAsyncWebServer @ ^3.6.0
  esp32async/AsyncTCP @ ^3.3.0

[env:olimex_poe_iso]
platform = espressif32 @ ^6.9.0
board = esp32-poe-iso
upload_speed = 921600
board_build.partitions = default.csv   ; dual-app (OTA-capable) + SPIFFS
build_flags =
  ${env.build_flags}
  -D RA_BOARD_OLIMEX_POE_ISO=1
